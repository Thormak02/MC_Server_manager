{% extends "base.html" %}
{% block content %}
<h1>Template bearbeiten</h1>

<section class="card">
    <form method="post" action="/templates/{{ template.id }}" class="grid grid-4" id="template-edit-form">
        <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required value="{{ template.name }}">
        </div>
        <div>
            <label for="server_type">Servertyp</label>
            <select id="server_type" name="server_type" required>
                {% for type_name in server_types %}
                <option value="{{ type_name }}" {% if template.server_type == type_name %}selected{% endif %}>{{ type_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="mc_version">Minecraft Version</label>
            <select id="mc_version" name="mc_version" required>
                {% for version in versions %}
                <option value="{{ version.id }}" {% if template.mc_version == version.id %}selected{% endif %}>{{ version.label }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="loader_version">Loader/Build (optional)</label>
            <input id="loader_version" name="loader_version" type="text" value="{{ template.loader_version or '' }}">
        </div>
        <div>
            <label for="java_profile_id">Java Profil</label>
            <select id="java_profile_id" name="java_profile_id">
                <option value="">-</option>
                {% for profile in java_profiles %}
                <option value="{{ profile.id }}" {% if template.java_profile_id == profile.id %}selected{% endif %}>{{ profile.name }}{% if profile.version_label %} ({{ profile.version_label }}){% endif %}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="memory_min_mb">RAM min (MB)</label>
            <div class="ram-slider-field">
                <div class="ram-slider-head">
                    <strong>Min</strong>
                    <span id="memory_min_label" class="muted"></span>
                </div>
                <input
                    id="memory_min_mb"
                    name="memory_min_mb"
                    class="ram-slider"
                    type="range"
                    min="512"
                    max="65536"
                    step="512"
                    value="{{ template.memory_min_mb or 2048 }}"
                >
            </div>
        </div>
        <div>
            <label for="memory_max_mb">RAM max (MB)</label>
            <div class="ram-slider-field">
                <div class="ram-slider-head">
                    <strong>Max</strong>
                    <span id="memory_max_label" class="muted"></span>
                </div>
                <input
                    id="memory_max_mb"
                    name="memory_max_mb"
                    class="ram-slider"
                    type="range"
                    min="512"
                    max="65536"
                    step="512"
                    value="{{ template.memory_max_mb or 4096 }}"
                >
            </div>
        </div>
        <div>
            <label for="port_min">Port min (optional)</label>
            <input id="port_min" name="port_min" type="number" min="1" max="65535" value="{{ template.port_min or '' }}">
        </div>
        <div>
            <label for="port_max">Port max (optional)</label>
            <input id="port_max" name="port_max" type="number" min="1" max="65535" value="{{ template.port_max or '' }}">
        </div>
        <div>
            <label for="start_parameters">Startparameter (optional)</label>
            <input id="start_parameters" name="start_parameters" type="text" value="{{ template.start_parameters or '' }}">
        </div>
        <div class="align-end">
            <label class="stack">
                <span>Standard-Template</span>
                <input id="is_default" name="is_default" type="checkbox" value="1" {% if template.is_default %}checked{% endif %}>
            </label>
        </div>
        <div class="stack" style="grid-column: span 4;">
            <label for="default_properties_json">Default Properties JSON (optional)</label>
            <textarea id="default_properties_json" name="default_properties_json" rows="4">{{ template.default_properties_json or '' }}</textarea>
        </div>
        <div class="align-end">
            <button type="submit">Template aktualisieren</button>
            <a class="button-like" href="/templates">Zurueck</a>
        </div>
    </form>
</section>

<script>
(function () {
    const typeSelect = document.getElementById("server_type");
    const versionSelect = document.getElementById("mc_version");
    const memoryMin = document.getElementById("memory_min_mb");
    const memoryMax = document.getElementById("memory_max_mb");
    const memoryMinLabel = document.getElementById("memory_min_label");
    const memoryMaxLabel = document.getElementById("memory_max_label");
    const RAM_MIN_MB = 512;
    const RAM_MAX_MB = 65536;
    const RAM_STEP_MB = 512;

    function clampRam(rawValue, fallback) {
        const parsed = Number.parseInt(String(rawValue || "").trim(), 10);
        const base = Number.isFinite(parsed) ? parsed : fallback;
        const rounded = Math.round(base / RAM_STEP_MB) * RAM_STEP_MB;
        return Math.min(RAM_MAX_MB, Math.max(RAM_MIN_MB, rounded));
    }

    function formatRam(valueMb) {
        const gb = valueMb / 1024;
        const gbLabel = Number.isInteger(gb) ? String(gb) : gb.toFixed(1);
        return `${gbLabel} GB (${valueMb} MB)`;
    }

    function syncMemoryInputs(changed) {
        if (!memoryMin || !memoryMax) return;
        let minValue = clampRam(memoryMin.value, 2048);
        let maxValue = clampRam(memoryMax.value, 4096);
        if (changed === "min" && minValue > maxValue) {
            maxValue = minValue;
        } else if (changed === "max" && maxValue < minValue) {
            minValue = maxValue;
        } else if (minValue > maxValue) {
            maxValue = minValue;
        }
        memoryMin.value = String(minValue);
        memoryMax.value = String(maxValue);
        if (memoryMinLabel) {
            memoryMinLabel.textContent = formatRam(minValue);
        }
        if (memoryMaxLabel) {
            memoryMaxLabel.textContent = formatRam(maxValue);
        }
    }

    if (memoryMin && memoryMax) {
        memoryMin.addEventListener("input", function () {
            syncMemoryInputs("min");
        });
        memoryMax.addEventListener("input", function () {
            syncMemoryInputs("max");
        });
        syncMemoryInputs();
    }
    if (!typeSelect || !versionSelect) return;

    async function reloadVersions(selected) {
        const serverType = typeSelect.value;
        const url = "/servers/create/versions?server_type=" + encodeURIComponent(serverType);
        try {
            const response = await fetch(url, { credentials: "same-origin" });
            if (!response.ok) return;
            const payload = await response.json();
            const versions = Array.isArray(payload.versions) ? payload.versions : [];
            versionSelect.innerHTML = "";
            for (const version of versions) {
                const option = document.createElement("option");
                option.value = version.id;
                option.textContent = version.label || version.id;
                if (selected && selected === version.id) {
                    option.selected = true;
                }
                versionSelect.appendChild(option);
            }
        } catch (_) {
            // keep current options on failure
        }
    }

    typeSelect.addEventListener("change", function () {
        reloadVersions();
    });
})();
</script>
{% endblock %}
