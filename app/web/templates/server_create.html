{% extends "base.html" %}
{% block content %}
<h1>Server erstellen</h1>

<section class="card">
    <form method="post" action="/servers/create" class="grid grid-4" id="create-server-form">
        <div>
            <label for="name">Servername</label>
            <input id="name" name="name" type="text" required>
        </div>
        <div>
            <label for="template_id">Template (optional)</label>
            <select id="template_id" name="template_id">
                <option value="">-</option>
                {% for tpl in templates %}
                <option value="{{ tpl.id }}"
                        data-server-type="{{ tpl.server_type }}"
                        data-mc-version="{{ tpl.mc_version }}"
                        data-loader-version="{{ tpl.loader_version or '' }}"
                        data-java-profile-id="{{ tpl.java_profile_id or '' }}"
                        data-memory-min="{{ tpl.memory_min_mb or '' }}"
                        data-memory-max="{{ tpl.memory_max_mb or '' }}"
                        data-port-min="{{ tpl.port_min or '' }}"
                        data-port-max="{{ tpl.port_max or '' }}"
                        data-start-parameters="{{ tpl.start_parameters or '' }}"
                        {% if default_template_id == tpl.id %}selected{% endif %}>
                    {{ tpl.name }}{% if tpl.is_default %} (Standard){% endif %}
                </option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="server_type">Servertyp</label>
            <select id="server_type" name="server_type" required>
                {% for type_name in server_types %}
                <option value="{{ type_name }}" {% if selected_type == type_name %}selected{% endif %}>{{ type_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="mc_version">Minecraft Version</label>
            <select id="mc_version" name="mc_version" required>
                {% for version in versions %}
                <option value="{{ version.id }}">{{ version.label }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="version_channel">Versionen Filter</label>
            <select id="version_channel">
                <option value="release">Release</option>
                <option value="beta">Beta/Snapshot</option>
                <option value="alpha">Alpha</option>
                <option value="all">Alle</option>
            </select>
        </div>
        <div id="loader_version_wrap" style="display: none;">
            <label for="loader_version">Loader/Build (optional)</label>
            <select id="loader_version" name="loader_version"></select>
        </div>
        <div id="loader_channel_wrap" style="display: none;">
            <label for="loader_channel">Loader Filter</label>
            <select id="loader_channel">
                <option value="all">Alle</option>
                <option value="release">Release</option>
                <option value="beta">Beta</option>
                <option value="alpha">Alpha</option>
            </select>
        </div>
        <div>
            <label for="target_path">Zielordner (optional)</label>
            <input
                id="target_path"
                name="target_path"
                type="text"
                placeholder="Leer lassen fuer Standard: {{ default_server_storage_root }}\\<servername>"
            >
        </div>
        <div>
            <label for="java_profile_id">Java Profil</label>
            <select id="java_profile_id" name="java_profile_id">
                <option value="">-</option>
                {% for profile in java_profiles %}
                <option value="{{ profile.id }}">{{ profile.name }}{% if profile.version_label %} ({{ profile.version_label }}){% endif %}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="memory_min_mb">RAM min (MB)</label>
            <input id="memory_min_mb" name="memory_min_mb" type="number" min="256" placeholder="2048">
        </div>
        <div>
            <label for="memory_max_mb">RAM max (MB)</label>
            <input id="memory_max_mb" name="memory_max_mb" type="number" min="256" placeholder="4096">
        </div>
        <div>
            <label for="port">Port (optional)</label>
            <input id="port" name="port" type="number" min="1" max="65535">
        </div>
        <div>
            <label for="start_parameters">Startparameter (optional)</label>
            <input id="start_parameters" name="start_parameters" type="text" placeholder="-Dfile.encoding=UTF-8">
        </div>
        <div class="align-end">
            <button type="submit">Server erstellen</button>
        </div>
    </form>
</section>

<script>
(function () {
    const typeSelect = document.getElementById("server_type");
    const versionSelect = document.getElementById("mc_version");
    const templateSelect = document.getElementById("template_id");
    const versionChannelSelect = document.getElementById("version_channel");
    const loaderWrap = document.getElementById("loader_version_wrap");
    const loaderChannelWrap = document.getElementById("loader_channel_wrap");
    const loaderSelect = document.getElementById("loader_version");
    const loaderChannelSelect = document.getElementById("loader_channel");
    const javaProfileSelect = document.getElementById("java_profile_id");
    const memoryMin = document.getElementById("memory_min_mb");
    const memoryMax = document.getElementById("memory_max_mb");
    const portInput = document.getElementById("port");
    const startParamsInput = document.getElementById("start_parameters");
    if (!typeSelect || !versionSelect) return;

    async function reloadVersions(selected) {
        const serverType = typeSelect.value;
        const channel = versionChannelSelect ? versionChannelSelect.value : "release";
        const url =
            "/servers/create/versions?server_type=" +
            encodeURIComponent(serverType) +
            "&channel=" +
            encodeURIComponent(channel);
        try {
            const response = await fetch(url, { credentials: "same-origin" });
            if (!response.ok) return;
            const payload = await response.json();
            const versions = Array.isArray(payload.versions) ? payload.versions : [];
            versionSelect.innerHTML = "";
            for (const version of versions) {
                const option = document.createElement("option");
                option.value = version.id;
                option.textContent = version.label || version.id;
                if (selected && selected === version.id) {
                    option.selected = true;
                }
                versionSelect.appendChild(option);
            }
        } catch (_) {
            // keep current options on failure
        }
    }

    function setLoaderVisible(visible) {
        if (!loaderWrap || !loaderSelect) return;
        loaderWrap.style.display = visible ? "block" : "none";
        if (loaderChannelWrap) {
            loaderChannelWrap.style.display = visible ? "block" : "none";
        }
        if (!visible) {
            loaderSelect.innerHTML = "";
        }
    }

    async function reloadLoaderVersions(selected) {
        if (!loaderSelect || !loaderWrap) return;
        const serverType = typeSelect.value;
        const mcVersion = versionSelect.value;
        const loaderChannel = loaderChannelSelect ? loaderChannelSelect.value : "all";
        if (!serverType || !mcVersion) {
            setLoaderVisible(false);
            return;
        }
        const url =
            "/servers/create/loader-versions?server_type=" +
            encodeURIComponent(serverType) +
            "&mc_version=" +
            encodeURIComponent(mcVersion) +
            "&channel=" +
            encodeURIComponent(loaderChannel);
        try {
            const response = await fetch(url, { credentials: "same-origin" });
            if (!response.ok) {
                setLoaderVisible(false);
                return;
            }
            const payload = await response.json();
            const versions = Array.isArray(payload.versions) ? payload.versions : [];
            if (!versions.length) {
                setLoaderVisible(false);
                return;
            }
            setLoaderVisible(true);
            loaderSelect.innerHTML = "";
            const empty = document.createElement("option");
            empty.value = "";
            empty.textContent = "-";
            loaderSelect.appendChild(empty);

            let hasSelected = false;
            for (const version of versions) {
                const option = document.createElement("option");
                option.value = version.id;
                option.textContent = version.label || version.id;
                if (selected && selected === version.id) {
                    option.selected = true;
                    hasSelected = true;
                }
                loaderSelect.appendChild(option);
            }
            if (selected && !hasSelected) {
                const option = document.createElement("option");
                option.value = selected;
                option.textContent = selected + " (custom)";
                option.selected = true;
                loaderSelect.appendChild(option);
            }
        } catch (_) {
            setLoaderVisible(false);
        }
    }

    typeSelect.addEventListener("change", async function () {
        await reloadVersions();
        await reloadLoaderVersions();
    });
    versionSelect.addEventListener("change", function () {
        reloadLoaderVersions();
    });
    if (versionChannelSelect) {
        versionChannelSelect.addEventListener("change", async function () {
            await reloadVersions();
            await reloadLoaderVersions();
        });
    }
    if (loaderChannelSelect) {
        loaderChannelSelect.addEventListener("change", function () {
            reloadLoaderVersions();
        });
    }

    async function applyTemplate() {
        if (!templateSelect) return;
        const option = templateSelect.options[templateSelect.selectedIndex];
        if (!option || !option.value) return;

        const serverType = option.dataset.serverType || "";
        const mcVersion = option.dataset.mcVersion || "";
        const loaderVersion = option.dataset.loaderVersion || "";
        const javaProfileId = option.dataset.javaProfileId || "";
        const memoryMinValue = option.dataset.memoryMin || "";
        const memoryMaxValue = option.dataset.memoryMax || "";
        const portValue = option.dataset.portMin || "";
        const startParams = option.dataset.startParameters || "";

        if (serverType) {
            typeSelect.value = serverType;
            await reloadVersions(mcVersion);
        } else if (mcVersion) {
            await reloadVersions(mcVersion);
        }
        if (mcVersion && versionSelect) {
            versionSelect.value = mcVersion;
        }
        await reloadLoaderVersions(loaderVersion);
        if (javaProfileSelect) {
            javaProfileSelect.value = javaProfileId;
        }
        if (memoryMin) {
            memoryMin.value = memoryMinValue;
        }
        if (memoryMax) {
            memoryMax.value = memoryMaxValue;
        }
        if (portInput && portValue) {
            portInput.value = portValue;
        }
        if (startParamsInput) {
            startParamsInput.value = startParams;
        }
    }

    if (templateSelect) {
        templateSelect.addEventListener("change", applyTemplate);
        if (templateSelect.value) {
            applyTemplate();
        }
    }

    reloadLoaderVersions();
})();
</script>
{% endblock %}
