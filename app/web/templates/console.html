{% extends "base.html" %}
{% block content %}
<h1>Konsole: {{ server.name }}</h1>

{% include "server_nav.html" %}

<section class="card">
    <div id="console-output" class="console-output scroll-pane scroll-pane-console">
        {% for line in recent_lines %}
        <div>{{ line }}</div>
        {% endfor %}
    </div>
</section>

{% if can_send_commands %}
<section class="card">
    <form method="post" action="/servers/{{ server.id }}/console/command" class="inline-form">
        <input id="console-command" name="command" type="text" placeholder="Befehl, z.B. say Hallo" required>
        <button type="submit">Senden</button>
    </form>
</section>
{% endif %}

<script>
    window.MCSM_CONSOLE_SERVER_ID = {{ server.id }};
</script>
<script src="/static/js/console.js"></script>
{% endblock %}
